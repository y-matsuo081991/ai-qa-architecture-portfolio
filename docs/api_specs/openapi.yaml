openapi: 3.0.3
info:
  title: Task Management API
  description: API for managing user tasks in the dummy app.
  version: 1.0.0
servers:
  - url: http://api.example.com/v1
paths:
  /tasks:
    get:
      summary: Get all tasks
      operationId: getTasks
      responses:
        '200':
          description: A list of tasks.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
  /tasks/{taskId}:
    get:
      summary: Get a task by ID
      operationId: getTaskById
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found.
components:
  schemas:
    Task:
      type: object
      required:
        - id
        - title
        - status
      properties:
        id:
          type: string
          example: "t-123"
        title:
          type: string
          example: "Implement E2E test"
        description:
          type: string
          example: "Write Playwright script for..."
        status:
          type: string
          enum: [TODO, IN_PROGRESS, DONE]
          example: "TODO"
