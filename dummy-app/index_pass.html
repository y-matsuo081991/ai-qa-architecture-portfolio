<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic VQA Dummy App - 正常系</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
            background: #fafafa;
        }
        .card h2 {
            margin-top: 0;
            font-size: 1.2em;
        }
        .btn {
            display: inline-block;
            background: #0056b3;
            color: #fff;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ユーザーダッシュボード</h1>
        <p>ようこそ、[USER_NAME]さん。本日のタスク状況です。</p>

        <div class="card-grid">
            <div class="card">
                <h2>タスク A</h2>
                <p>PlaywrightのE2Eテストスクリプトを実装する。</p>
                <a href="#" class="btn">詳細を見る</a>
            </div>
            <div class="card">
                <h2>タスク B</h2>
                <p>VLMによるレイアウト崩れ検知のプロンプトを調整する。</p>
                <a href="#" class="btn">詳細を見る</a>
            </div>
            <div class="card">
                <h2>タスク C</h2>
                <p>GitHub Actionsで自動実行パイプラインを構築する。</p>
                <a href="#" class="btn">詳細を見る</a>
            </div>
        </div>
    </div>
</body>
</html>
